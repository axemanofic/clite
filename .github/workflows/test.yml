name: test
'on':
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          uv sync --locked --only-dev
  format:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Run black
        run: uv run black --check .
      - name: Run isort
        run: uv run isort --check .
  lint:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Run ruff
        run: uv run ruff check .
  typing:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Run mypy
        run: uv run mypy .
  tests:
    runs-on: ubuntu-latest
    needs:
      - lints
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --locked --only-group tests
      - name: Run tests
        run: uv run pytest
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
