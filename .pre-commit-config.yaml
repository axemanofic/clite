# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: check-ast
      - id: check-toml
      - id: check-yaml
        exclude: 'mkdocs.yml'

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix
        language: python
        types: [python]
        require_serial: true
        verbose: true
        pass_filenames: false

      - id: mypy
        name: Mypy
        entry: uv run mypy .
        language: python
        types: [python]
        require_serial: true
        verbose: true
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: python
        types: [python]
        require_serial: true
        verbose: true
        pass_filenames: false

      - id: black
        name: black
        entry: uv run black .
        language: python
        types: [python]
        require_serial: true
        verbose: true
        pass_filenames: false

      - id: isort
        name: isort
        entry: uv run isort .
        language: python
        types: [python]
        require_serial: true
        verbose: true
        pass_filenames: false

